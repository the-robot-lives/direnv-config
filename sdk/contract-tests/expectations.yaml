tests:
  # --- Simple scalar reads ---
  - name: get simple string
    store: simple-store
    config: cluster
    path: name
    expected: noizu
    type: string

  - name: get nested string
    store: simple-store
    config: cluster
    path: node_pool.instance_type
    expected: m5.xlarge
    type: string

  - name: get nested integer
    store: simple-store
    config: cluster
    path: node_pool.min
    expected: 2
    type: integer

  - name: get boolean
    store: simple-store
    config: cluster
    path: enabled
    expected: true
    type: boolean

  - name: get integer value
    store: simple-store
    config: cluster
    path: port
    expected: 6443
    type: integer

  # --- Entire config ---
  - name: get entire config returns map
    store: simple-store
    config: cluster
    path: null
    expected_keys:
      - name
      - kubeconfig
      - context
      - region
      - node_pool
      - tags
      - enabled
      - port
    type: map

  # --- Array indexing ---
  - name: get array element by index
    store: nested-store
    config: app
    path: endpoints[0].host
    expected: api.example.com
    type: string

  - name: get array element mid
    store: nested-store
    config: app
    path: endpoints[1].port
    expected: 8080
    type: integer

  - name: get last array element
    store: nested-store
    config: app
    path: endpoints[2].host
    expected: backup.example.com
    type: string

  # --- Negative indexing ---
  - name: negative index last
    store: nested-store
    config: app
    path: endpoints[-1].host
    expected: backup.example.com
    type: string

  - name: negative index second to last
    store: nested-store
    config: app
    path: endpoints[-2].port
    expected: 8080
    type: integer

  # --- Wildcard ---
  - name: wildcard collects all hosts
    store: nested-store
    config: app
    path: endpoints[*].host
    expected:
      - api.example.com
      - internal.example.com
      - backup.example.com
    type: string_array

  - name: wildcard collects all ports
    store: nested-store
    config: app
    path: endpoints[*].port
    expected:
      - 443
      - 8080
      - 443
    type: integer_array

  # --- Length ---
  - name: length of sequence
    store: nested-store
    config: app
    path: endpoints.length
    expected: 3
    type: integer

  - name: length of map
    store: nested-store
    config: app
    path: metadata.length
    expected: 3
    type: integer

  - name: length of tags array
    store: simple-store
    config: cluster
    path: tags.length
    expected: 3
    type: integer

  # --- Chained brackets ---
  - name: matrix chained index
    store: nested-store
    config: app
    path: matrix[0][1]
    expected: 2
    type: integer

  - name: matrix second row last element
    store: nested-store
    config: app
    path: matrix[1][-1]
    expected: 6
    type: integer

  # --- Deep nested ---
  - name: deep nested string
    store: nested-store
    config: app
    path: metadata.labels.env
    expected: staging
    type: string

  # --- Missing paths ---
  - name: missing top-level key
    store: simple-store
    config: cluster
    path: nonexistent
    expected: null
    type: "null"

  - name: missing nested key
    store: simple-store
    config: cluster
    path: node_pool.nonexistent.deep
    expected: null
    type: "null"

  - name: out of bounds index
    store: nested-store
    config: app
    path: endpoints[99]
    expected: null
    type: "null"

  - name: negative out of bounds
    store: nested-store
    config: app
    path: endpoints[-99]
    expected: null
    type: "null"

  # --- Version ---
  - name: version read simple
    store: simple-store
    expected_version: 3

  - name: version read nested
    store: nested-store
    expected_version: 7

  # --- Config listing ---
  - name: list configs simple
    store: simple-store
    expected_configs:
      - cluster

  - name: list configs nested
    store: nested-store
    expected_configs:
      - app

  # --- Path hashing ---
  - name: path hash simple
    input_path: /Users/keith/Github/k8/projects
    expected_hash: Users-keith-Github-k8-projects

  - name: path hash root
    input_path: /
    expected_hash: ""

  - name: path hash single segment
    input_path: /tmp
    expected_hash: tmp
