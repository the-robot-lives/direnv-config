# Expected resolved state for: demo/root/
# Named configs present: cluster, cloudflare, tab, build, npl, _dc

cluster:
  name: noizu
  kubeconfig: ~/.kube/noizu/config
  context: noizu
  region: us-east-1
  node_pool:
    min: 2
    max: 8
    instance_type: m5.xlarge

cloudflare:
  account_id: a75e7459...
  zone_id: 46014d24...
  zone_id_trl: 9793b993...
  api_token: ""                        # from secrets layer (seeded empty)
  access:
    client_id: 7ebfc690...access
    client_secret: ""                  # from secrets layer (seeded empty)
  tunnel:
    enabled: true
    name: noizu-tunnel

tab:
  theme: kanagawa
  status: idle

build:
  env: prod
  registry: ghcr.io/noizu
  push_on_build: false

npl:
  project: noizu-infra

