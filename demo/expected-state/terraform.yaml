# Expected resolved state for: demo/root/projects/terraform/
# Pruned: cluster (entire), services (entire), npl (entire), build (entire)
# Pruned partial: cloudflare.tunnel (branch), cloudflare.zone_id_trl (key via unset)
# Modified: tab (merge)
# Added: terraform
#
# This demonstrates heavy pruning — terraform only keeps what it needs.
# All operations used --no-bump, finalized with single dc_bump.

# cluster: PRUNED
# services: PRUNED
# npl: PRUNED
# build: PRUNED

cloudflare:
  account_id: a75e7459...                  # inherited — Terraform CF provider needs this
  zone_id: 46014d24...                     # inherited
  api_token: ""                            # inherited from secrets layer
  access:                                  # inherited
    client_id: 7ebfc690...access
    client_secret: ""
  # zone_id_trl: GONE — dc_unset removed this individual key
  # tunnel: GONE — dc_prune cloudflare tunnel removed this branch

tab:
  theme: nord                              # was: catppuccin (from projects/)
  status: terraform                        # was: projects
  emoji: wrench                            # NEW

terraform:                                 # NEW — terraform-specific config
  workspace: production
  backend:
    type: s3
    bucket: noizu-tf-state
    region: us-east-1
    lock_table: noizu-tf-locks
    encrypt: true
  providers:
    cloudflare:
      version: "~> 4.0"
    aws:
      version: "~> 5.0"
      region: us-east-1

